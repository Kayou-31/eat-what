<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>今天晚上吃什么</title>
    <style>
        :root {
            --bg: #0f0e0c;
            --card: #1a1816;
            --surface: #211e1a;
            --text: #e8e0d5;
            --text-secondary: #9b9488;
            --accent: #f0a050;
            --accent-glow: rgba(240, 160, 80, 0.25);
            --accent-strong: #e8892c;
            --green: #6db87d;
            --blue: #5b9bd5;
            --purple: #9b7ec4;
            --pink: #d4828c;
            --teal: #5faa9b;
            --border: #2a2520;
            --border-active: #3d3630;
            --shadow: 0 8px 40px rgba(0, 0, 0, 0.5);
            --radius-lg: 22px;
            --radius-md: 14px;
            --radius-sm: 10px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', sans-serif;
            background: var(--bg);
            background-image:
                radial-gradient(ellipse at 50% 0%, rgba(240, 160, 80, 0.06) 0%, transparent 55%),
                radial-gradient(ellipse at 85% 100%, rgba(109, 184, 125, 0.04) 0%, transparent 50%),
                radial-gradient(ellipse at 15% 80%, rgba(155, 126, 196, 0.03) 0%, transparent 45%);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            color: var(--text);
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: var(--card);
            border-radius: var(--radius-lg);
            padding: 36px 24px 28px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 24px;
            transition: transform 0.2s;
        }

        /* 头部 */
        .header {
            text-align: center;
        }
        .title {
            font-size: clamp(1.5rem, 5.5vw, 1.95rem);
            font-weight: 800;
            letter-spacing: 0.05em;
            background: linear-gradient(135deg, #f0a050 0%, #f5c882 30%, #e8892c 60%, #f0a050 100%);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmer 4s ease-in-out infinite;
            margin-bottom: 2px;
        }
        .subtitle {
            font-size: 0.78rem;
            color: var(--text-secondary);
            letter-spacing: 0.08em;
        }
        @keyframes shimmer {
            0%,
            100% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
        }

        /* 按钮网格 */
        .btn-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .btn-meal {
            position: relative;
            padding: 14px 8px;
            font-size: clamp(0.82rem, 3.2vw, 0.95rem);
            font-weight: 700;
            letter-spacing: 0.04em;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-md);
            cursor: pointer;
            background: var(--surface);
            color: var(--text);
            transition: all 0.18s ease;
            overflow: hidden;
            white-space: nowrap;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-meal::after {
            content: '';
            position: absolute;
            inset: 0;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
        }
        .btn-meal:hover {
            border-color: var(--border-active);
            transform: translateY(-1px);
            box-shadow: 0 4px 18px rgba(0, 0, 0, 0.3);
        }
        .btn-meal:active {
            transform: scale(0.955);
            transition: transform 0.08s;
        }

        /* 各按钮主题色 */
        .btn-meal.this-meal {
            border-left: 3px solid var(--accent);
        }
        .btn-meal.this-meal:hover {
            border-color: var(--accent);
            background: #2a2218;
        }
        .btn-meal.this-meal:active {
            background: #352a1c;
        }

        .btn-meal.next-meal {
            border-left: 3px solid var(--blue);
        }
        .btn-meal.next-meal:hover {
            border-color: var(--blue);
            background: #1a2128;
        }
        .btn-meal.next-meal:active {
            background: #1e2630;
        }

        .btn-meal.today {
            border-left: 3px solid var(--green);
        }
        .btn-meal.today:hover {
            border-color: var(--green);
            background: #18241c;
        }
        .btn-meal.today:active {
            background: #1c2c20;
        }

        .btn-meal.tomorrow {
            border-left: 3px solid var(--purple);
        }
        .btn-meal.tomorrow:hover {
            border-color: var(--purple);
            background: #201d28;
        }
        .btn-meal.tomorrow:active {
            background: #262230;
        }

        .btn-meal.week {
            border-left: 3px solid var(--pink);
        }
        .btn-meal.week:hover {
            border-color: var(--pink);
            background: #281d20;
        }
        .btn-meal.week:active {
            background: #302226;
        }

        .btn-meal.month {
            border-left: 3px solid var(--teal);
        }
        .btn-meal.month:hover {
            border-color: var(--teal);
            background: #182420;
        }
        .btn-meal.month:active {
            background: #1c2c26;
        }

        .btn-icon {
            font-size: 1.2em;
            flex-shrink: 0;
        }

        /* 结果区 */
        .result-wrapper {
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: var(--radius-md);
            padding: 6px;
            min-height: 68px;
            max-height: 52vh;
            max-height: 52dvh;
            overflow-y: auto;
            transition: all 0.3s;
            scroll-behavior: smooth;
        }
        .result-wrapper:empty {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .result-wrapper.has-results {
            border-color: var(--border-active);
        }

        /* 自定义滚动条 */
        .result-wrapper::-webkit-scrollbar {
            width: 5px;
        }
        .result-wrapper::-webkit-scrollbar-track {
            background: transparent;
            border-radius: 3px;
        }
        .result-wrapper::-webkit-scrollbar-thumb {
            background: #3a3530;
            border-radius: 3px;
        }
        .result-wrapper::-webkit-scrollbar-thumb:hover {
            background: #4a4540;
        }

        .result-placeholder {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 22px 16px;
            color: #5a5450;
            font-size: 0.9rem;
            letter-spacing: 0.05em;
            text-align: center;
            min-height: 56px;
        }

        .result-list {
            display: flex;
            flex-direction: column;
            gap: 5px;
            padding: 6px 4px;
        }

        .result-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 9px 14px;
            background: #1c1916;
            border-radius: var(--radius-sm);
            animation: slideUp 0.32s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
            font-size: 0.93rem;
            letter-spacing: 0.03em;
            border: 1px solid transparent;
            transition: border-color 0.2s;
        }
        .result-item:hover {
            border-color: #332e28;
        }
        .result-item.compact {
            padding: 6px 12px;
            font-size: 0.82rem;
            gap: 6px;
        }
        .result-tag {
            flex-shrink: 0;
            font-weight: 700;
            font-size: 0.78em;
            padding: 3px 10px;
            border-radius: 20px;
            letter-spacing: 0.04em;
            white-space: nowrap;
        }
        .tag-morning {
            background: rgba(240, 180, 80, 0.2);
            color: #f5c882;
        }
        .tag-noon {
            background: rgba(240, 140, 60, 0.2);
            color: #f09c46;
        }
        .tag-evening {
            background: rgba(180, 130, 200, 0.2);
            color: #c4a8d8;
        }
        .tag-weekday {
            background: rgba(130, 170, 200, 0.18);
            color: #a0c4dc;
        }
        .tag-date {
            background: rgba(120, 180, 160, 0.18);
            color: #8cc4b0;
        }
        .tag-this {
            background: rgba(240, 160, 80, 0.22);
            color: #f0b868;
        }
        .tag-next {
            background: rgba(91, 155, 213, 0.2);
            color: #7db8e0;
        }
        .result-food {
            flex: 1;
            font-weight: 600;
            color: #e8e0d5;
            word-break: break-all;
        }

        @keyframes slideUp {
            0% {
                opacity: 0;
                transform: translateY(16px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 响应式 */
        @media (max-width: 380px) {
            .container {
                padding: 24px 14px 20px;
                border-radius: 18px;
                gap: 16px;
            }
            .btn-grid {
                gap: 7px;
            }
            .btn-meal {
                padding: 12px 6px;
                font-size: 0.78rem;
                border-radius: 10px;
            }
            .btn-icon {
                font-size: 1em;
            }
            .result-item {
                padding: 7px 10px;
                font-size: 0.85rem;
            }
            .result-item.compact {
                padding: 5px 8px;
                font-size: 0.74rem;
            }
        }
        @media (min-width: 420px) {
            .btn-meal {
                padding: 15px 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <div class="header">
            <div class="title">🍽️ 今天晚上吃什么</div>
            <div class="subtitle">随机决策器 · 100种美食任选</div>
        </div>

        <!-- 按钮区 -->
        <div class="btn-grid">
            <button class="btn-meal this-meal" id="btnThisMeal">
                <span class="btn-icon">🍜</span> 这顿吃什么
            </button>
            <button class="btn-meal next-meal" id="btnNextMeal">
                <span class="btn-icon">⏭️</span> 下顿吃什么
            </button>
            <button class="btn-meal today" id="btnToday">
                <span class="btn-icon">📅</span> 今天吃什么
            </button>
            <button class="btn-meal tomorrow" id="btnTomorrow">
                <span class="btn-icon">☀️</span> 明天吃什么
            </button>
            <button class="btn-meal week" id="btnWeek">
                <span class="btn-icon">📋</span> 这周吃什么
            </button>
            <button class="btn-meal month" id="btnMonth">
                <span class="btn-icon">🗓️</span> 这个月吃什么
            </button>
        </div>

        <!-- 结果区 -->
        <div class="result-wrapper" id="resultWrapper">
            <div class="result-placeholder" id="resultPlaceholder">👆 点一个按钮试试吧</div>
        </div>
    </div>

    <script>
        (function () {
            // ============ 食物列表 (0-99) ============
            const foods = [
                // 中餐 0-59
                '麻辣烫', '火锅', '烧烤', '蛋炒饭', '盖浇饭', '兰州拉面', '刀削面', '炸酱面',
                '热干面', '担担面', '酸辣粉', '过桥米线', '炒河粉', '肠粉', '小笼包',
                '生煎包', '锅贴', '水饺', '馄饨', '煎饼果子', '肉夹馍', '凉皮',
                '鸡蛋灌饼', '手抓饼', '葱油饼', '油条配豆浆', '豆腐脑', '包子', '馒头配菜',
                '花卷', '粽子', '汤圆', '春卷', '烧麦', '煲仔饭', '卤肉饭',
                '黄焖鸡米饭', '酸菜鱼', '水煮肉片', '宫保鸡丁', '鱼香肉丝', '回锅肉',
                '红烧肉', '糖醋里脊', '麻婆豆腐', '西红柿炒鸡蛋', '青椒肉丝', '蒜蓉西兰花',
                '干煸四季豆', '地三鲜', '木须肉', '京酱肉丝', '东坡肉', '辣子鸡',
                '大盘鸡', '羊肉泡馍', '螺蛳粉', '红油抄手', '肥肠粉', '牛肉面',
                // 西餐及其他 60-99
                '汉堡', '薯条', '披萨', '意大利肉酱面', '牛排', '三明治', '热狗', '炸鸡',
                '凯撒沙拉', '意式烩饭', '墨西哥卷饼', '塔可', '寿司', '日式拉面', '咖喱鸡饭',
                '蛋包饭', '石锅拌饭', '炸猪排', '烤鸡', '香煎三文鱼', '法式面包', '可颂',
                '华夫饼', '美式煎饼', '吐司煎蛋', '牛奶麦片', '酸奶水果捞', '水果沙拉',
                '鸡肉卷', '蔬菜沙拉', '罗宋汤', '奶油蘑菇汤', '烤鸡翅', '炸鱼薯条',
                '土耳其烤肉', '芝士通心粉', '日式牛肉饭', '照烧鸡肉饭', '亲子丼', '鳗鱼饭'
            ];

            // ============ DOM 元素 ============
            const resultWrapper = document.getElementById('resultWrapper');
            const resultPlaceholder = document.getElementById('resultPlaceholder');
            const btnThisMeal = document.getElementById('btnThisMeal');
            const btnNextMeal = document.getElementById('btnNextMeal');
            const btnToday = document.getElementById('btnToday');
            const btnTomorrow = document.getElementById('btnTomorrow');
            const btnWeek = document.getElementById('btnWeek');
            const btnMonth = document.getElementById('btnMonth');

            // ============ 工具函数 ============
            /** Fisher-Yates 洗牌 */
            function shuffle(arr) {
                const a = arr.slice();
                for (let i = a.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [a[i], a[j]] = [a[j], a[i]];
                }
                return a;
            }

            /** 获取 n 个不重复的随机食物（n ≤ 100） */
            function getRandomFoods(n) {
                const clamped = Math.min(n, 100);
                const indices = Array.from({ length: 100 }, (_, i) => i);
                const shuffled = shuffle(indices);
                return shuffled.slice(0, clamped).map(i => foods[i]);
            }

            /** 根据当前小时判断餐次标签 */
            function getCurrentMealLabel() {
                const h = new Date().getHours();
                if (h >= 6 && h < 11) return { label: '早餐', cssClass: 'tag-morning' };
                if (h >= 11 && h < 16) return { label: '午餐', cssClass: 'tag-noon' };
                if (h >= 16 && h < 23) return { label: '晚餐', cssClass: 'tag-evening' };
                return { label: '夜宵', cssClass: 'tag-evening' };
            }

            function getNextMealLabel() {
                const h = new Date().getHours();
                if (h < 6) return { label: '早餐', cssClass: 'tag-morning' };
                if (h < 11) return { label: '午餐', cssClass: 'tag-noon' };
                if (h < 16) return { label: '晚餐', cssClass: 'tag-evening' };
                return { label: '明日早餐', cssClass: 'tag-morning' };
            }

            /** 今天剩余餐次 */
            function getTodayRemainingMeals() {
                const h = new Date().getHours();
                if (h < 6) {
                    return [
                        { label: '早上', cssClass: 'tag-morning' },
                        { label: '中午', cssClass: 'tag-noon' },
                        { label: '晚上', cssClass: 'tag-evening' },
                    ];
                } else if (h < 11) {
                    return [
                        { label: '中午', cssClass: 'tag-noon' },
                        { label: '晚上', cssClass: 'tag-evening' },
                    ];
                } else {
                    return [
                        { label: '晚上', cssClass: 'tag-evening' },
                    ];
                }
            }

            // ============ 渲染结果 ============
            function renderResults(items) {
                // items: [{ tag, tagClass, food }]
                resultPlaceholder.style.display = 'none';
                resultWrapper.classList.add('has-results');

                // 移除旧列表
                const oldList = resultWrapper.querySelector('.result-list');
                if (oldList) oldList.remove();

                const list = document.createElement('div');
                list.className = 'result-list';

                const isCompact = items.length >= 14; // 超过14个用紧凑模式

                items.forEach((item, index) => {
                    const row = document.createElement('div');
                    row.className = 'result-item';
                    if (isCompact) row.classList.add('compact');
                    row.style.animationDelay = `${index * 0.03}s`;

                    const tag = document.createElement('span');
                    tag.className = `result-tag ${item.tagClass}`;
                    tag.textContent = item.tag;

                    const food = document.createElement('span');
                    food.className = 'result-food';
                    food.textContent = item.food;

                    row.appendChild(tag);
                    row.appendChild(food);
                    list.appendChild(row);
                });

                resultWrapper.appendChild(list);
                resultWrapper.scrollTop = 0;

                // 振动反馈
                if (navigator.vibrate) {
                    navigator.vibrate(12);
                }
            }

            function renderSingleResult(tagObj, food) {
                renderResults([{ tag: tagObj.label, tagClass: tagObj.cssClass, food }]);
            }

            // ============ 按钮事件 ============
            btnThisMeal.addEventListener('click', () => {
                const meal = getCurrentMealLabel();
                const [food] = getRandomFoods(1);
                renderSingleResult(meal, food);
            });

            btnNextMeal.addEventListener('click', () => {
                const meal = getNextMealLabel();
                const [food] = getRandomFoods(1);
                renderSingleResult(meal, food);
            });

            btnToday.addEventListener('click', () => {
                const meals = getTodayRemainingMeals();
                const foodsList = getRandomFoods(meals.length);
                const items = meals.map((m, i) => ({
                    tag: m.label,
                    tagClass: m.cssClass,
                    food: foodsList[i],
                }));
                renderResults(items);
            });

            btnTomorrow.addEventListener('click', () => {
                const meals = [
                    { label: '早上', cssClass: 'tag-morning' },
                    { label: '中午', cssClass: 'tag-noon' },
                    { label: '晚上', cssClass: 'tag-evening' },
                ];
                const foodsList = getRandomFoods(3);
                const items = meals.map((m, i) => ({
                    tag: m.label,
                    tagClass: m.cssClass,
                    food: foodsList[i],
                }));
                renderResults(items);
            });

            btnWeek.addEventListener('click', () => {
                const days = ['周一', '周二', '周三', '周四', '周五', '周六', '周日'];
                const foodsList = getRandomFoods(7);
                const items = days.map((d, i) => ({
                    tag: d,
                    tagClass: 'tag-weekday',
                    food: foodsList[i],
                }));
                renderResults(items);
            });

            btnMonth.addEventListener('click', () => {
                const foodsList = getRandomFoods(30);
                const items = foodsList.map((food, i) => ({
                    tag: `${i + 1}号`,
                    tagClass: 'tag-date',
                    food,
                }));
                renderResults(items);
            });

            // ============ 键盘快捷键 ============
            const keyMap = {
                '1': btnThisMeal,
                '2': btnNextMeal,
                '3': btnToday,
                '4': btnTomorrow,
                '5': btnWeek,
                '6': btnMonth,
            };
            document.addEventListener('keydown', (e) => {
                if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
                const btn = keyMap[e.key];
                if (btn) {
                    e.preventDefault();
                    btn.click();
                }
            });

            console.log('🍽️ 今天晚上吃什么 —— 已就绪');
            console.log('快捷键：1-这顿 | 2-下顿 | 3-今天 | 4-明天 | 5-这周 | 6-这个月');
        })();
    </script>
</body>
</html>
