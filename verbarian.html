            justify-content: center;

        }

            100% {

            function levenshtein(a, b) {
                const m = a.length,
                    n = b.length;
                const dp = Array.from({ length: m + 1 }, () => Array(n + 1).fill(0));
                for (let i = 0; i <= m; i++) dp[i][0] = i;
                for (let j = 0; j <= n; j++) dp[0][j] = j;
                for (let i = 1; i <= m; i++)
                    for (let j = 1; j <= n; j++)
                        dp[i][j] = a[i - 1] === b[j - 1] ? dp[i - 1][j - 1] : Math.min(dp[i - 1][j], dp[i][j - 1], dp[i - 1][j -
                            1]) + 1;
                return dp[m][n];
            }

                if (!tagsA.length && !tagsB.length) return 0;
                const sA = new Set(tagsA),
                    sB = new Set(tagsB);
                let inter = 0;
                for (const t of sA)
                    if (sB.has(t)) inter++;
                const union = new Set([...sA, ...sB]).size;
                return union === 0 ? 0 : inter / union;
            }

            function glyphSim(wordA, wordB) {
                const chA = [...wordA],
                    chB = [...wordB];
                const sA = new Set(chA),
                    sB = new Set(chB);
                let inter = 0;
                for (const c of sA)
                    if (sB.has(c)) inter++;
                const union = new Set([...sA, ...sB]).size;
                const overlap = union === 0 ? 0 : inter / union;
                const dist = levenshtein(wordA, wordB);
                const maxLen = Math.max(chA.length, chB.length);
                const editSim = maxLen === 0 ? 1 : 1 - dist / maxLen;
                return (overlap + editSim) / 2;

                const maxLen = Math.max(pa.length, pb.length);

                    glyph: Math.round(glyph * 100),

                      </div>
                    </div>
                  </div>
                `;

                document.getElementById('btnBackSetup').onclick = renderSetup;
                document.getElementById('btnRandomSelect').onclick = () => {
                    const shuffled = [...allCandidateHints].sort(() => Math.random() - 0.5);
                    selectedHints = shuffled.slice(0, Math.min(5, shuffled.length));
                    updateHintUI();
                };
                document.getElementById('btnConfirmHints').onclick = () => {
                    if (selectedHints.length < 2) { alert('至少选择2条提示'); return; }
                    remainingHints = [...selectedHints];
                    renderGame();
                };

                window.toggleHint = function(el) {
                    const tag = el.dataset.tag;
                    const idx = selectedHints.indexOf(tag);
                    if (idx > -1) {
                        selectedHints.splice(idx, 1);
                        el.classList.remove('active');
                        el.querySelector('.check').textContent = ' ';
                    } else {
                        selectedHints.push(tag);
                        el.classList.add('active');
                        el.querySelector('.check').textContent = '✓';
                    }
                    document.getElementById('selectedCount').textContent = selectedHints.length;
                };
            }

            function renderCustomHints() {
                gamePhase = 'customHints';
                let customHints = [];
                const containerId = 'customHintList';

                function renderCustomUI() {
                    const listHtml = customHints.map((h, i) =>
                        `<div class="hint-item"><span>${h}</span><span class="remove-btn" data-idx="${i}">✕</span></div>`
                    ).join('');
                    app.innerHTML = `
                      <div class="glass rounded-[32px] p-8 md:p-10 card-shadow">
                        <div class="flex items-center gap-3 mb-4">
                          <button id="btnBackSetup2" class="btn-ghost text-sm">← 上一步</button>
                          <h2 class="text-xl font-bold text-slate-800">自定义提示</h2>
                        </div>
                        <div class="mb-2">
                          <span class="section-title">目标词：</span>
                          <span class="text-lg font-bold text-indigo-600">${targetWord}</span>
                        </div>
                        <p class="text-sm text-slate-500 mb-4">输入你为猜词者准备的提示（至少2条，建议3~5条）</p>
                        <div class="custom-hint-input-group">
                          <input id="customHintInput" class="input-modern" placeholder="输入一条提示..." maxlength="20" />
                          <button id="btnAddHint" class="btn-secondary">添加</button>
                        </div>
                        <div id="${containerId}" class="custom-hint-list mb-4">
                          ${listHtml}
                        </div>
                        <div class="flex justify-between items-center">
                          <span class="text-sm text-slate-400">已添加 <span id="customCount">${customHints.length}</span> 条</span>
                          <button id="btnConfirmCustom" class="btn-primary">开始游戏</button>
                        </div>
                      </div>
                    `;
                    // 绑定事件
                    document.getElementById('btnBackSetup2').onclick = renderSetup;
                    document.getElementById('btnAddHint').onclick = () => {
                        const input = document.getElementById('customHintInput');
                        const val = input.value.trim();
                        if (!val) return;
                        if (customHints.includes(val)) { alert('提示已存在'); return; }
                        customHints.push(val);
                        input.value = '';
                        renderCustomUI();
                        document.getElementById('customHintInput').focus();
                    };
                    document.getElementById('customHintInput').addEventListener('keydown', e => {
                        if (e.key === 'Enter') document.getElementById('btnAddHint').click();
                    });
                    document.getElementById('btnConfirmCustom').onclick = () => {
                        if (customHints.length < 2) { alert('至少添加2条提示'); return; }
                        remainingHints = [...customHints];
                        renderGame();
                    };
                    // 删除事件
                    document.querySelectorAll(`#${containerId} .remove-btn`).forEach(el => {
                        el.onclick = function() {
                            const idx = parseInt(this.dataset.idx);
                            customHints.splice(idx, 1);
                            renderCustomUI();
                        };
                    });
                    document.getElementById('customCount').textContent = customHints.length;
                    setTimeout(() => {
                        const inp = document.getElementById('customHintInput');
                        if (inp) inp.focus();
                    }, 100);
                }
                renderCustomUI();
            }

            function updateHintUI() {
                const container = document.getElementById('hintTagsContainer');
                if (!container) return;
                const chips = container.querySelectorAll('.tag-chip');
                chips.forEach(chip => {
                    const tag = chip.dataset.tag;
                    const active = selectedHints.includes(tag);
                    chip.classList.toggle('active', active);
                    chip.querySelector('.check').textContent = active ? '✓' : ' ';
                });
                const countEl = document.getElementById('selectedCount');
                if (countEl) countEl.textContent = selectedHints.length;
            }

            function renderGame() {
                gamePhase = 'playing';
                guessedSet.clear();
                historyEntries = [];
                chancesLeft = MAX_CHANCES;
                gameOver = false;
                targetPinyin = getPinyin(targetWord);
                if (!wordTagMap.has(targetWord)) {
                    targetTags = [];
                } else {
                    targetTags = wordTagMap.get(targetWord);
                }

                const hintDisplayHtml = remainingHints.length > 0 ?
                    `<div id="hintDisplayArea" class="mt-4 space-y-1"></div>` :
                    '<p class="text-sm text-slate-400 mt-2">暂无提示，等待主理人发放</p>';

                const hintSendHtml = remainingHints.length > 0 ?
                    `<div class="flex items-center gap-3">
                      <span class="text-sm font-medium text-slate-600">待发提示：<span id="hintRemainingCount">${remainingHints.length}</span> 条</span>
                      <button id="btnSendHint" class="btn-secondary text-sm">📤 发放下一条</button>
                    </div>` :
                    `<span class="text-sm text-slate-400">所有提示已发放</span>`;

                app.innerHTML = `
                  <div class="glass rounded-[32px] card-shadow overflow-hidden">
                    <!-- 游戏头部 -->
                    <div class="p-6 pb-0">
                      <div class="flex items-center justify-between mb-4">
                        <h2 class="text-lg font-bold text-slate-800">🎯 猜词挑战</h2>
                        <div class="flex items-center gap-2">
                          <span class="text-sm text-slate-500">剩余</span>
                          <span id="chancesLeftNum" class="text-2xl font-extrabold text-indigo-600">${chancesLeft}</span>
                          <span class="text-sm text-slate-400">次</span>
                        </div>
                      </div>
                      <!-- 机会条 -->
                      <div class="progress-glow mb-4">
                        <div id="chancesBar" class="fill" style="width:${(chancesLeft/MAX_CHANCES)*100}%"></div>
                      </div>
                      <!-- 输入 -->
                      <div class="flex gap-2">
                        <input id="guessInput" class="input-modern flex-1" placeholder="输入你的猜测..." maxlength="10" autocomplete="off" />
                        <button id="btnGuess" class="btn-primary px-6">猜</button>
                      </div>
                    </div>

                    <!-- 结果卡片 -->
                    <div id="resultCard" class="mx-6 mt-4 p-4 bg-white/60 rounded-2xl border border-slate-200/60 hidden transition-all duration-500"></div>

                    <!-- 提示展示区 -->
                    <div class="mx-6 mt-2" id="hintArea">
                      ${hintDisplayHtml}
                    </div>

                    <!-- 历史记录 -->
                    <div class="mx-6 mt-4 mb-2">
                      <div class="flex justify-between items-center mb-2">
                        <span class="section-title">猜测记录</span>
                        <span id="historyCount" class="text-xs text-slate-400">0 次</span>
                      </div>
                      <div id="historyList" class="max-h-32 overflow-y-auto hidden-scrollbar space-y-1"></div>
                    </div>

                    <!-- 主理人控制栏 -->
                    <div class="controller-bar p-4 mt-2">
                      <div class="flex items-center justify-between flex-wrap gap-3">
                        <div class="flex items-center gap-3">
                          <span class="text-sm font-semibold text-slate-600">🧑‍💼 主理人</span>
                          ${hintSendHtml}
                        </div>
                        <div class="flex gap-2">
                          <button id="btnReveal" class="btn-ghost text-red-500 border-red-200 hover:bg-red-50">🔍 直接揭晓</button>
                          <button id="btnEndGame" class="btn-ghost">🔄 重新出题</button>
                        </div>
                      </div>
                      <div id="targetSecretBox" class="mt-3">
                        <details class="text-sm text-slate-500">
                          <summary class="cursor-pointer hover:text-indigo-600 transition">👁️ 点击显示目标词（主理人专属）</summary>
                          <p class="mt-2 text-lg font-bold text-indigo-600">${targetWord}</p>
                        </details>
                      </div>
                    </div>
                  </div>
                `;

                const guessInput = document.getElementById('guessInput');
                const btnGuess = document.getElementById('btnGuess');
                const chancesLeftNum = document.getElementById('chancesLeftNum');
                const chancesBar = document.getElementById('chancesBar');
                const resultCard = document.getElementById('resultCard');
                const historyList = document.getElementById('historyList');
                const historyCount = document.getElementById('historyCount');
                const hintDisplayArea = document.getElementById('hintDisplayArea');

                function updateUI() {
                    chancesLeftNum.textContent = chancesLeft;
                    chancesBar.style.width = (chancesLeft / MAX_CHANCES) * 100 + '%';
                    historyCount.textContent = historyEntries.length + ' 次';
                    const hintRemainingCount = document.getElementById('hintRemainingCount');
                    const btnSendHint = document.getElementById('btnSendHint');
                    if (hintRemainingCount) hintRemainingCount.textContent = remainingHints.length;
                    if (btnSendHint) {
                        if (remainingHints.length === 0) {
                            btnSendHint.disabled = true;
                            btnSendHint.classList.add('opacity-50', 'cursor-not-allowed');
                            btnSendHint.textContent = '📤 已发完';
                        } else {
                            btnSendHint.disabled = false;
                            btnSendHint.classList.remove('opacity-50', 'cursor-not-allowed');
                            btnSendHint.textContent = '📤 发放下一条';
                        }
                    }
                }

                function addHistory(entry) {
                    const item = document.createElement('div');
                    item.className = 'hist-item flex items-center gap-2';
                    const scoreCls = scoreColor(entry.score);
                    item.innerHTML = `
                      <span class="text-xs text-slate-400 w-6">#${historyEntries.length}</span>
                      <span class="flex-1 font-medium text-slate-700">${entry.word}</span>
                      <span class="font-bold ${scoreCls}">${entry.score}%</span>
                    `;
                    item.onclick = () => showResultCard(entry.word, entry);
                    historyList.prepend(item);
                }

                function showResultCard(word, result) {
                    resultCard.classList.remove('hidden');
                    const sColor = scoreColor(result.score);
                    resultCard.innerHTML = `
                      <div class="text-center mb-3">
                        <span class="text-xl font-bold text-slate-800">${word}</span>
                        <span class="ml-2 text-xs bg-indigo-100 text-indigo-600 px-2 py-0.5 rounded-full">${result.score}%</span>
                      </div>
                      <div class="grid grid-cols-3 gap-2 mb-2">
                        <div class="dim-card"><span class="section-title">📖 含义</span><div class="text-lg font-bold ${scoreColor(result.meaning)}">${result.meaning}%</div></div>
                        <div class="dim-card"><span class="section-title">✍️ 字形</span><div class="text-lg font-bold ${scoreColor(result.glyph)}">${result.glyph}%</div></div>
                        <div class="dim-card"><span class="section-title">🔊 拼音</span><div class="text-lg font-bold ${scoreColor(result.pinyin)}">${result.pinyin}%</div></div>
                      </div>
                      <div class="progress-glow">
                        <div class="fill" style="width:${result.score}%; background: linear-gradient(90deg, #f59e0b, #10b981);"></div>
                      </div>
                    `;
                }

                function handleGuess() {
                    if (gameOver) return;
                    const guess = guessInput.value.trim();
                    if (!guess) {
                        guessInput.classList.add('border-red-400');
                        setTimeout(() => guessInput.classList.remove('border-red-400'), 400);
                        return;
                    }
                    if (guessedSet.has(guess)) {
                        guessInput.classList.add('border-orange-400');
                        setTimeout(() => guessInput.classList.remove('border-orange-400'), 400);
                        return;
                    }
                    guessedSet.add(guess);
                    if (guess === targetWord) {
                        const result = { score: 100, meaning: 100, glyph: 100, pinyin: 100 };
                        historyEntries.unshift({ word: guess, ...result });
                        addHistory({ word: guess, ...result });
                        showResultCard(guess, result);
                        gameOver = true;
                        guessInput.disabled = true;
                        btnGuess.disabled = true;
                        showModal('🎉', '猜中了！', `目标词就是 <strong>「${targetWord}」</strong><br>共用了 ${MAX_CHANCES - chancesLeft + 1} 次机会`);
                        updateUI();
                        return;
                    }
                    const result = computeMatch(guess, targetWord, targetTags, targetPinyin);
                    historyEntries.unshift({ word: guess, ...result });
                    addHistory({ word: guess, ...result });
                    showResultCard(guess, result);
                    chancesLeft--;
                    updateUI();
                    if (chancesLeft <= 0) {
                        gameOver = true;
                        guessInput.disabled = true;
                        btnGuess.disabled = true;
                        showModal('😢', '次数用尽', `目标词是 <strong>「${targetWord}」</strong><br>别灰心，下次一定！`);
                    }
                    guessInput.value = '';
                    guessInput.focus();
                }

                document.getElementById('btnSendHint').onclick = () => {
                    if (remainingHints.length === 0) return;
                    const hint = remainingHints.shift();
                    const bubble = document.createElement('div');
                    bubble.className = 'hint-bubble';
                    bubble.innerHTML = `<span class="font-semibold text-indigo-600">💡 提示：</span> ${hint}`;
                    if (hintDisplayArea) {
                        hintDisplayArea.appendChild(bubble);
                    } else {
                        const area = document.getElementById('hintArea');
                        if (area) {
                            const newArea = document.createElement('div');
                            newArea.id = 'hintDisplayArea';
                            newArea.className = 'mt-4 space-y-1';
                            newArea.appendChild(bubble);
                            area.innerHTML = '';
                            area.appendChild(newArea);
                        }
                    }
                    updateUI();
                    if (navigator.vibrate) navigator.vibrate(15);
                };

                document.getElementById('btnReveal').onclick = () => {
                    if (gameOver) return;
                    gameOver = true;
                    guessInput.disabled = true;
                    btnGuess.disabled = true;
                    showModal('🏳️', '已揭晓', `目标词是 <strong>「${targetWord}」</strong>`);
                };

                document.getElementById('btnEndGame').onclick = () => {
                    if (!gameOver && !confirm('当前游戏未结束，确认重新出题吗？')) return;
                    gameOver = true;
                    guessInput.disabled = true;
                    btnGuess.disabled = true;
                    renderSetup();
                };

                btnGuess.onclick = handleGuess;
                guessInput.addEventListener('keydown', e => { if (e.key === 'Enter') handleGuess(); });
                guessInput.focus();
                updateUI();
            }

            // ---------- 弹窗 ----------
            function showModal(icon, title, text) {
                const overlay = document.createElement('div');
                overlay.className = 'modal-overlay';
                overlay.innerHTML = `
                  <div class="modal-box text-center">
                    <div class="text-5xl mb-4">${icon}</div>
                    <h3 class="text-2xl font-bold text-slate-800 mb-2">${title}</h3>
                    <p class="text-slate-500 mb-6">${text}</p>
                    <div class="flex justify-center gap-3">
                      <button id="modalReplay" class="btn-primary">再来一局</button>
                      <button id="modalHome" class="btn-secondary">返回首页</button>
                    </div>
                  </div>
                `;
                document.body.appendChild(overlay);
                document.getElementById('modalReplay').onclick = () => {
                    overlay.remove();
                    renderSetup();
                };
                document.getElementById('modalHome').onclick = () => {
                    overlay.remove();
                    renderHome();
                };
                overlay.onclick = (e) => {
                    if (e.target === overlay) overlay.remove();
                };
            }

            renderHome();

        })();
    </script>
</body>
</html>
