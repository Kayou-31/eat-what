<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>猜词挑战 · 多维相似度</title>
    <script src="https://cdn.jsdelivr.net/npm/pinyin-pro@3.22.1/dist/index.js">
    </script>
    <style>
        /* ═══════════════════ 基础 & 变量（浅色主题） ═══════════════════ */
        :root {
            --bg-deep: #f4f4f7;
            --bg-card: #ffffff;
            --bg-surface: #f0f0f4;
            --bg-surface2: #e8e8ee;
            --bg-surface3: #dddde4;
            --border: #d0d0da;
            --border-light: #bebec8;
            --text: #1a1a2e;
            --text-secondary: #5a5a6e;
            --text-muted: #8a8a9e;
            --accent: #6c5ce7;
            --accent-soft: rgba(108, 92, 231, 0.12);
            --accent-glow: rgba(108, 92, 231, 0.20);
            --green: #27ae60;
            --teal: #1abc9c;
            --blue: #3498db;
            --yellow: #f1c40f;
            --orange: #e67e22;
            --red: #e74c3c;
            --pink: #e84393;
            --radius-xl: 28px;
            --radius-lg: 20px;
            --radius-md: 14px;
            --radius-sm: 10px;
            --shadow-card: 0 8px 40px rgba(0, 0, 0, 0.08);
            --shadow-glow: 0 0 30px rgba(108, 92, 231, 0.08);
            --transition: 0.28s cubic-bezier(0.22, 1, 0.36, 1);
            --font: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', system-ui, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font);
            background: var(--bg-deep);
            background-image:
                radial-gradient(ellipse at 20% 10%, rgba(108, 92, 231, 0.06) 0%, transparent 55%),
                radial-gradient(ellipse at 80% 90%, rgba(39, 174, 96, 0.04) 0%, transparent 50%);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 14px;
            color: var(--text);
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
            -webkit-font-smoothing: antialiased;
        }

        /* ═══════════════════ 容器 ═══════════════════ */
        .container {
            width: 100%;
            max-width: 500px;
            background: var(--bg-card);
            border-radius: var(--radius-xl);
            padding: 28px 20px 22px;
            box-shadow: var(--shadow-card), var(--shadow-glow);
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 16px;
            position: relative;
            overflow: hidden;
        }

        .container::before {
            content: '';
            position: absolute;
            top: -60%;
            right: -30%;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(108, 92, 231, 0.05) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }

        /* ═══════════════════ 头部 ═══════════════════ */
        .header {
            text-align: center;
            position: relative;
            z-index: 1;
        }

        .title {
            font-size: clamp(1.5rem, 5.5vw, 2rem);
            font-weight: 800;
            letter-spacing: 0.03em;
            background: linear-gradient(135deg, #6c5ce7, #a29bfe, #3498db, #6c5ce7);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradShift 6s ease-in-out infinite;
            position: relative;
            display: inline-block;
        }

        .title::after {
            content: '🎯';
            font-size: 0.7em;
            -webkit-text-fill-color: initial;
            margin-left: 6px;
            display: inline-block;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes gradShift {
            0%,
            100% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
        }

        @keyframes float {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-5px);
            }
        }

        .subtitle {
            font-size: 0.75rem;
            color: var(--text-secondary);
            letter-spacing: 0.08em;
            margin-top: 1px;
            font-weight: 400;
            opacity: 0.7;
        }

        /* ═══════════════════ 状态栏 ═══════════════════ */
        .status-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            background: var(--bg-surface);
            border-radius: var(--radius-md);
            padding: 10px 14px;
            border: 1px solid var(--border);
            position: relative;
            z-index: 1;
        }

        .status-left {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
            min-width: 0;
        }

        .chances-label {
            font-size: 0.78rem;
            color: var(--text-secondary);
            white-space: nowrap;
            letter-spacing: 0.03em;
        }

        .chances-number {
            font-size: 1.25rem;
            font-weight: 800;
            color: var(--text);
            min-width: 28px;
            text-align: center;
            line-height: 1;
        }

        .chances-bar-wrap {
            flex: 1;
            min-width: 50px;
            height: 6px;
            border-radius: 4px;
            background: var(--bg-surface3);
            overflow: hidden;
            position: relative;
        }

        .chances-bar-fill {
            height: 100%;
            border-radius: 4px;
            background: var(--accent);
            transition: width 0.5s ease, background 0.5s ease;
            position: relative;
        }

        .chances-bar-fill::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.25), transparent);
            animation: shimmer 2.5s infinite;
        }

        @keyframes shimmer {
            0% {
                transform: translateX(-100%);
            }
            100% {
                transform: translateX(100%);
            }
        }

        .btn-giveup {
            font-size: 0.72rem;
            padding: 5px 14px;
            border-radius: 18px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            letter-spacing: 0.04em;
            transition: var(--transition);
            white-space: nowrap;
            font-weight: 500;
        }

        .btn-giveup:hover {
            border-color: var(--red);
            color: var(--red);
            background: rgba(231, 76, 60, 0.06);
        }

        .btn-giveup:active {
            transform: scale(0.92);
        }

        /* ═══════════════════ 输入行 ═══════════════════ */
        .input-row {
            display: flex;
            gap: 10px;
            position: relative;
            z-index: 1;
        }

        .input-row input {
            flex: 1;
            padding: 14px 16px;
            font-size: 1.05rem;
            font-weight: 600;
            letter-spacing: 0.04em;
            border: 2px solid var(--border);
            border-radius: var(--radius-md);
            background: var(--bg-surface);
            color: var(--text);
            outline: none;
            transition: var(--transition);
            font-family: inherit;
            min-width: 0;
        }

        .input-row input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px var(--accent-soft), 0 0 30px rgba(108, 92, 231, 0.06);
            background: var(--bg-surface2);
        }

        .input-row input::placeholder {
            color: var(--text-muted);
            font-weight: 400;
            font-size: 0.92rem;
        }

        .btn-guess {
            flex-shrink: 0;
            padding: 14px 24px;
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 0.06em;
            border: none;
            border-radius: var(--radius-md);
            background: linear-gradient(135deg, var(--accent), #8f7afa);
            color: #fff;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 4px 24px rgba(108, 92, 231, 0.25);
            white-space: nowrap;
            position: relative;
            overflow: hidden;
        }

        .btn-guess::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, transparent, rgba(255, 255, 255, 0.15));
            opacity: 0;
            transition: opacity 0.3s;
        }

        .btn-guess:hover::before {
            opacity: 1;
        }

        .btn-guess:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(108, 92, 231, 0.35);
        }

        .btn-guess:active {
            transform: scale(0.94);
            transition: transform 0.08s;
        }

        .btn-guess:disabled {
            opacity: 0.35;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        /* ═══════════════════ 结果卡片 ═══════════════════ */
        .result-card {
            background: var(--bg-surface);
            border: 1.5px solid var(--border);
            border-radius: var(--radius-md);
            padding: 16px 16px 14px;
            transition: all 0.45s cubic-bezier(0.22, 1, 0.36, 1);
            opacity: 0;
            transform: translateY(16px) scale(0.97);
            pointer-events: none;
            position: relative;
            z-index: 1;
            max-height: 0;
            overflow: hidden;
            padding: 0 16px;
            margin: 0;
            border-width: 0;
        }

        .result-card.visible {
            opacity: 1;
            transform: translateY(0) scale(1);
            pointer-events: auto;
            max-height: 340px;
            padding: 16px 16px 14px;
            border-width: 1.5px;
            margin: 0;
        }

        .result-card .guess-word {
            font-size: 1.35rem;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-align: center;
            margin-bottom: 12px;
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .result-card .guess-word .word-badge {
            background: var(--accent-soft);
            color: var(--accent);
            font-size: 0.6em;
            padding: 2px 10px;
            border-radius: 12px;
            font-weight: 600;
            letter-spacing: 0.04em;
        }

        .dims-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
            margin-bottom: 12px;
        }

        .dim-item {
            text-align: center;
            background: var(--bg-surface2);
            border-radius: var(--radius-sm);
            padding: 10px 6px 8px;
            display: flex;
            flex-direction: column;
            gap: 2px;
            border: 1px solid transparent;
            transition: border-color 0.3s;
        }

        .dim-item:hover {
            border-color: var(--border-light);
        }

        .dim-label {
            font-size: 0.65rem;
            letter-spacing: 0.06em;
            color: var(--text-muted);
            text-transform: uppercase;
            font-weight: 500;
        }

        .dim-value {
            font-size: 1.35rem;
            font-weight: 800;
            line-height: 1.2;
            transition: color 0.3s;
        }

        .dim-value.color-green {
            color: var(--green);
        }
        .dim-value.color-teal {
            color: var(--teal);
        }
        .dim-value.color-blue {
            color: var(--blue);
        }
        .dim-value.color-yellow {
            color: var(--yellow);
        }
        .dim-value.color-orange {
            color: var(--orange);
        }
        .dim-value.color-red {
            color: var(--red);
        }
        .dim-value.color-white {
            color: var(--text);
        }

        .total-row {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--bg-surface2);
            border-radius: var(--radius-sm);
            padding: 8px 12px;
        }

        .total-label {
            font-size: 0.72rem;
            color: var(--text-muted);
            letter-spacing: 0.04em;
            white-space: nowrap;
            font-weight: 500;
        }

        .total-bar {
            flex: 1;
            height: 10px;
            border-radius: 6px;
            background: var(--bg-surface3);
            overflow: hidden;
            position: relative;
        }

        .total-bar-fill {
            height: 100%;
            border-radius: 6px;
            background: linear-gradient(90deg, var(--red), var(--orange), var(--yellow), var(--green));
            transition: width 0.6s cubic-bezier(0.22, 1, 0.36, 1);
            position: relative;
        }

        .total-bar-fill::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            animation: shimmer 2s infinite;
        }

        .total-percent {
            font-size: 1.15rem;
            font-weight: 800;
            min-width: 44px;
            text-align: right;
            color: var(--text);
            transition: color 0.3s;
        }

        .total-percent.perc-green {
            color: var(--green);
        }
        .total-percent.perc-teal {
            color: var(--teal);
        }
        .total-percent.perc-yellow {
            color: var(--yellow);
        }
        .total-percent.perc-orange {
            color: var(--orange);
        }
        .total-percent.perc-red {
            color: var(--red);
        }

        /* ═══════════════════ 提示区 ═══════════════════ */
        .hints-area {
            display: flex;
            flex-direction: column;
            gap: 6px;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s cubic-bezier(0.22, 1, 0.36, 1);
            position: relative;
            z-index: 1;
        }

        .hints-area.open {
            max-height: 400px;
        }

        .hints-header {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.72rem;
            color: var(--text-secondary);
            letter-spacing: 0.06em;
            padding: 2px 2px 4px;
            font-weight: 500;
        }

        .hints-header .hint-dot {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent);
            margin-right: 4px;
            animation: pulse-dot 1.6s infinite;
        }

        @keyframes pulse-dot {
            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.5;
                transform: scale(1.3);
            }
        }

        .hints-list {
            display: flex;
            flex-direction: column;
            gap: 5px;
            padding-right: 4px;
        }

        .hint-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            background: linear-gradient(135deg, rgba(108, 92, 231, 0.06), rgba(52, 152, 219, 0.03));
            border-left: 3.5px solid var(--accent);
            border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
            font-size: 0.85rem;
            letter-spacing: 0.03em;
            color: var(--text-secondary);
            animation: hintIn 0.45s cubic-bezier(0.22, 1, 0.36, 1) both;
            transition: background 0.3s;
        }

        .hint-item:hover {
            background: linear-gradient(135deg, rgba(108, 92, 231, 0.10), rgba(52, 152, 219, 0.05));
        }

        @keyframes hintIn {
            0% {
                opacity: 0;
                transform: translateX(-20px) scale(0.95);
            }
            100% {
                opacity: 1;
                transform: translateX(0) scale(1);
            }
        }

        .hint-icon {
            font-size: 1.05rem;
            flex-shrink: 0;
        }

        .hint-tag {
            display: inline-block;
            background: rgba(108, 92, 231, 0.13);
            color: var(--accent);
            padding: 1px 10px;
            border-radius: 14px;
            font-weight: 700;
            font-size: 0.82rem;
            margin: 0 3px;
            letter-spacing: 0.02em;
        }

        .hint-count-badge {
            font-size: 0.68rem;
            color: var(--text-muted);
            background: var(--bg-surface2);
            padding: 1px 10px;
            border-radius: 12px;
            margin-left: auto;
            white-space: nowrap;
        }

        /* ═══════════════════ 历史记录 ═══════════════════ */
        .history-section {
            position: relative;
            z-index: 1;
        }

        .history-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 2px 2px 6px;
        }

        .history-header span {
            font-size: 0.72rem;
            color: var(--text-secondary);
            letter-spacing: 0.06em;
            font-weight: 500;
        }

        .history-header .history-count {
            font-size: 0.65rem;
            color: var(--text-muted);
            background: var(--bg-surface2);
            padding: 1px 10px;
            border-radius: 12px;
        }

        .history-list {
            max-height: 26vh;
            max-height: 26dvh;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 4px;
            padding-right: 4px;
            scroll-behavior: smooth;
        }

        .history-list::-webkit-scrollbar {
            width: 4px;
        }

        .history-list::-webkit-scrollbar-track {
            background: transparent;
        }

        .history-list::-webkit-scrollbar-thumb {
            background: var(--bg-surface3);
            border-radius: 4px;
        }

        .history-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            background: var(--bg-surface);
            border-radius: var(--radius-sm);
            font-size: 0.84rem;
            letter-spacing: 0.03em;
            cursor: pointer;
            border: 1px solid transparent;
            transition: all 0.25s ease;
            animation: histIn 0.35s cubic-bezier(0.22, 1, 0.36, 1) both;
        }

        .history-item:hover {
            border-color: var(--border-light);
            background: var(--bg-surface2);
            transform: translateX(4px);
        }

        .history-item:active {
            transform: scale(0.97);
        }

        @keyframes histIn {
            0% {
                opacity: 0;
                transform: translateY(12px) scale(0.96);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .history-index {
            font-size: 0.65rem;
            color: var(--text-muted);
            min-width: 20px;
            text-align: center;
            font-weight: 600;
        }

        .history-word {
            flex: 1;
            font-weight: 600;
            color: var(--text);
            font-size: 0.9rem;
        }

        .history-score {
            font-weight: 700;
            font-size: 0.88rem;
            min-width: 40px;
            text-align: right;
            padding: 2px 8px;
            border-radius: 10px;
            background: var(--bg-surface2);
            transition: background 0.3s;
        }

        .history-score.high {
            color: var(--green);
            background: rgba(39, 174, 96, 0.10);
        }
        .history-score.mid {
            color: var(--yellow);
            background: rgba(241, 196, 15, 0.10);
        }
        .history-score.low {
            color: var(--red);
            background: rgba(231, 76, 60, 0.10);
        }

        .history-empty {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.82rem;
            padding: 20px 16px;
            letter-spacing: 0.04em;
            background: var(--bg-surface);
            border-radius: var(--radius-sm);
            border: 1px dashed var(--border);
        }

        /* ═══════════════════ 弹窗 ═══════════════════ */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.40);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            padding: 20px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .modal {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            padding: 30px 24px 24px;
            text-align: center;
            max-width: 360px;
            width: 100%;
            box-shadow: 0 12px 60px rgba(0, 0, 0, 0.15);
            animation: modalPop 0.4s cubic-bezier(0.22, 1, 0.36, 1);
        }

        @keyframes modalPop {
            0% {
                opacity: 0;
                transform: scale(0.88) translateY(20px);
            }
            100% {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .modal-icon {
            font-size: 3.8rem;
            margin-bottom: 10px;
            display: block;
            animation: modalIcon 0.6s ease;
        }

        @keyframes modalIcon {
            0% {
                transform: rotate(-15deg) scale(0.8);
            }
            60% {
                transform: rotate(5deg) scale(1.1);
            }
            100% {
                transform: rotate(0) scale(1);
            }
        }

        .modal-title {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 6px;
            letter-spacing: 0.04em;
            color: var(--text);
        }

        .modal-text {
            font-size: 0.88rem;
            color: var(--text-secondary);
            margin-bottom: 20px;
            letter-spacing: 0.03em;
            line-height: 1.5;
        }

        .modal-text strong {
            color: var(--accent);
            font-weight: 700;
        }

        .modal-btn {
            display: inline-block;
            padding: 12px 36px;
            font-size: 0.95rem;
            font-weight: 700;
            letter-spacing: 0.06em;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            background: linear-gradient(135deg, var(--accent), #8f7afa);
            color: #fff;
            transition: var(--transition);
            box-shadow: 0 4px 24px rgba(108, 92, 231, 0.30);
        }

        .modal-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 36px rgba(108, 92, 231, 0.40);
        }

        .modal-btn:active {
            transform: scale(0.94);
        }

        /* ═══════════════════ 工具动画 ═══════════════════ */
        @keyframes shake {
            0%,
            100% {
                transform: translateX(0);
            }
            20% {
                transform: translateX(-8px);
            }
            40% {
                transform: translateX(8px);
            }
            60% {
                transform: translateX(-5px);
            }
            80% {
                transform: translateX(5px);
            }
        }

        .shake {
            animation: shake 0.45s ease !important;
        }

        /* 输入框闪边框 */
        .input-warn {
            border-color: var(--orange) !important;

            /* ══════════════════════════════ 游戏状态 ══════════════════════════════ */
            const MAX_CHANCES = 30;
            const HINT_INTERVAL = 5; // 每猜错 5 次解锁一条提示
            const MAX_HINTS = 5; // 最多 5 条提示

            let targetWord = '';
            let targetTags = [];
            let targetPinyinStr = '';
            let chancesLeft = MAX_CHANCES;
            let historyEntries = [];
            let gameOver = false;
            let wrongCount = 0;
            let hintIndex = 0;

            /* ══════════════════════════════ 核心算法 ══════════════════════════════ */
            function getPinyin(word) {
                if (typeof pinyinPro === 'undefined') return '';
                try {
                    return pinyinPro.pinyin(word, { toneType: 'none', type: 'array' }).join('');
                } catch (_) { return ''; }
            }

            function levenshtein(a, b) {
                const m = a.length,
                    n = b.length;
                const dp = Array.from({ length: m + 1 }, () => Array(n + 1).fill(0));
                for (let i = 0; i <= m; i++) dp[i][0] = i;
                for (let j = 0; j <= n; j++) dp[0][j] = j;
                for (let i = 1; i <= m; i++) {
                    for (let j = 1; j <= n; j++) {
                        dp[i][j] = a[i - 1] === b[j - 1] ?
                            dp[i - 1][j - 1] :
                            Math.min(dp[i - 1][j], dp[i][j - 1], dp[i - 1][j - 1]) + 1;
                    }
                }
                return dp[m][n];
            }

            function meaningSim(tagsA, tagsB) {
                if (!tagsA.length && !tagsB.length) return 0;
                const sA = new Set(tagsA),
                    sB = new Set(tagsB);
                let inter = 0;
                for (const t of sA)
                    if (sB.has(t)) inter++;
                const union = new Set([...sA, ...sB]).size;
                return union === 0 ? 0 : inter / union;
            }

            function glyphSim(wordA, wordB) {
                const chA = [...wordA],
                    chB = [...wordB];
                const sA = new Set(chA),
                    sB = new Set(chB);
                let inter = 0;
                for (const c of sA)
                    if (sB.has(c)) inter++;
                const union = new Set([...sA, ...sB]).size;
                const overlap = union === 0 ? 0 : inter / union;
                const dist = levenshtein(wordA, wordB);
                const maxLen = Math.max(chA.length, chB.length);
                const editSim = maxLen === 0 ? 1 : 1 - dist / maxLen;
                return (overlap + editSim) / 2;
            }

            function pinyinSim(pa, pb) {
                if (!pa || !pb) return 0;
                const dist = levenshtein(pa, pb);
                const maxLen = Math.max(pa.length, pb.length);
                return maxLen === 0 ? 1 : 1 - dist / maxLen;
            }

            function computeMatch(guess) {
                const gTags = wordTagMap.get(guess) || [];
                const gPy = getPinyin(guess);
                const meaning = meaningSim(targetTags, gTags);
                const glyph = glyphSim(targetWord, guess);
                const pinyin = pinyinSim(targetPinyinStr, gPy);
                const total = meaning * 0.40 + glyph * 0.35 + pinyin * 0.25;
                return {
                    score: Math.min(Math.round(total * 100), 99),
                    meaning: Math.round(meaning * 100),
                    glyph: Math.round(glyph * 100),
                    pinyin: Math.round(pinyin * 100),
                };
            }

            function scoreClass(val) {
                if (val >= 80) return 'green';
                if (val >= 60) return 'teal';
                if (val >= 40) return 'yellow';
                if (val >= 20) return 'orange';
                return 'red';
            }

            function scoreColor(val) {
                if (val >= 80) return 'green';
                if (val >= 60) return 'teal';
                if (val >= 40) return 'yellow';
                if (val >= 20) return 'orange';
                return 'red';
            }

            /* ══════════════════════════════ UI 更新 ══════════════════════════════ */
            function updateStatusBar() {
                chancesLeftEl.textContent = chancesLeft;
                const pct = (chancesLeft / MAX_CHANCES) * 100;
                chancesBarFill.style.width = pct + '%';
                if (chancesLeft <= 3) chancesBarFill.style.background = 'var(--red)';
                else if (chancesLeft <= 7) chancesBarFill.style.background = 'var(--orange)';
                else if (chancesLeft <= 12) chancesBarFill.style.background = 'var(--yellow)';
                else chancesBarFill.style.background = 'var(--accent)';
            }

            function updateHintsDisplay() {
                if (hintIndex === 0) {
                    hintsArea.classList.remove('open');
                    hintsList.innerHTML = '';
                    hintCountBadge.textContent = `0 / ${MAX_HINTS}`;
                    return;
                }
                hintsArea.classList.add('open');
                const showCount = Math.min(hintIndex, MAX_HINTS);
                hintCountBadge.textContent = `${showCount} / ${MAX_HINTS}`;
                hintsList.innerHTML = '';
                for (let i = 0; i < showCount; i++) {
                    const tag = targetTags[i] || targetTags[targetTags.length - 1] || '未知';
                    const item = document.createElement('div');
                    item.className = 'hint-item';
                    item.style.animationDelay = `${i * 0.06}s`;
                    item.innerHTML = `
                        <span class="hint-icon">💡</span>
                        <span>这个词属于 <span class="hint-tag">${tag}</span></span>
                    `;
                    hintsList.appendChild(item);
                }
            }

            function updateHistoryDisplay() {
                const len = historyEntries.length;
                historyCount.textContent = `${len} 次`;
                if (len === 0) {
                    historyList.innerHTML = '';
                    historyList.appendChild(historyEmpty);
                    historyEmpty.style.display = '';
                    return;
                }
                historyEmpty.style.display = 'none';
                historyList.innerHTML = '';
                historyEntries.forEach((entry, idx) => {
                    const item = document.createElement('div');
                    item.className = 'history-item';
                    item.style.animationDelay = `${idx * 0.02}s`;
                    const sClass = entry.score >= 80 ? 'high' : entry.score >= 40 ? 'mid' : 'low';
                    item.innerHTML = `
                        <span class="history-index">#${idx + 1}</span>
                        <span class="history-word">${entry.word}</span>
                        <span class="history-score ${sClass}">${entry.score}%</span>
                    `;
                    item.addEventListener('click', () => showResultCard(entry.word, entry));
                    historyList.appendChild(item);
                });
                setTimeout(() => { historyList.scrollTop = historyList.scrollHeight; }, 50);
            }

            function showResultCard(word, result) {
                resultWordText.textContent = word;
                const sClass = scoreClass(result.score);
                const badges = { green: '🔥 很接近', teal: '👍 不错', yellow: '👀 还行', orange: '🤔 一般', red: '❄️ 较远' };
                resultBadge.textContent = badges[sClass] || '';
                dimMeaning.textContent = result.meaning + '%';
                dimMeaning.className = 'dim-value color-' + scoreColor(result.meaning);
                dimGlyph.textContent = result.glyph + '%';
                dimGlyph.className = 'dim-value color-' + scoreColor(result.glyph);
                dimPinyin.textContent = result.pinyin + '%';
                dimPinyin.className = 'dim-value color-' + scoreColor(result.pinyin);
                totalBarFill.style.width = result.score + '%';
                totalPercent.textContent = result.score + '%';
                totalPercent.className = 'total-percent perc-' + scoreColor(result.score);
                resultCard.classList.add('visible');
            }

            function tryUnlockHint() {
                if (wrongCount > 0 && wrongCount % HINT_INTERVAL === 0 && wrongCount <= MAX_HINTS * HINT_INTERVAL) {
                    const nextIdx = wrongCount / HINT_INTERVAL;
                    if (nextIdx > hintIndex && nextIdx <= MAX_HINTS && nextIdx <= targetTags.length) {
                        hintIndex = nextIdx;
                        updateHintsDisplay();
                        if (navigator.vibrate) navigator.vibrate([12, 35, 12]);
                    }
                }
            }

            function shakeEl(el) {
                el.classList.remove('shake');
                void el.offsetWidth;
                el.classList.add('shake');
                setTimeout(() => el.classList.remove('shake'), 500);
            }

            function flashBorder(el, cls, duration = 600) {
                el.classList.add(cls);
                setTimeout(() => el.classList.remove(cls), duration);
            }

            /* ══════════════════════════════ 游戏逻辑 ══════════════════════════════ */
            function handleGuess() {
                if (gameOver) return;
                const guessWord = guessInput.value.trim();
                if (!guessWord) {
                    shakeEl(guessInput);
                    flashBorder(guessInput, 'input-warn', 400);
                    guessInput.focus();
                    return;
                }
                if (guessedSet.has(guessWord)) {
                    shakeEl(guessInput);
                    flashBorder(guessInput, 'input-warn');
                    guessInput.value = '';
                    guessInput.focus();
                    return;
                }
                guessedSet.add(guessWord);
                if (guessWord === targetWord) {
                    const result = { score: 100, meaning: 100, glyph: 100, pinyin: 100 };
                    historyEntries.unshift({ word: guessWord, ...result });
                    showResultCard(guessWord, result);
                    updateHistoryDisplay();
                    gameOver = true;
                    btnGuess.disabled = true;
                    guessInput.disabled = true;
                    flashBorder(guessInput, 'input-success', 800);
                    showModal('🎉', '恭喜猜中！',
                        `目标词就是 <strong>「${targetWord}」</strong><br>共用了 ${MAX_CHANCES - chancesLeft} 次机会`,
                        '再来一局', resetGame);
                    return;
                }
                wrongCount++;
                const result = computeMatch(guessWord);
                historyEntries.unshift({ word: guessWord, ...result });
                showResultCard(guessWord, result);
                updateHistoryDisplay();
                chancesLeft--;
                updateStatusBar();
                tryUnlockHint();
                if (chancesLeft <= 0) {
                    gameOver = true;
                    btnGuess.disabled = true;
                    guessInput.disabled = true;
                    showModal('😢', '次数用尽',
                        `目标词是 <strong>「${targetWord}」</strong><br>别灰心，下次一定行！`,
                        '再来一局', resetGame);
                }
                guessInput.value = '';
                guessInput.focus();
                if (navigator.vibrate) navigator.vibrate(8);
            }

            /* ══════════════════════════════ 弹窗 ══════════════════════════════ */
            function showModal(icon, title, text, btnText, callback) {
                modalContainer.innerHTML = `
                    <div class="modal-overlay" id="modalOverlay">
                        <div class="modal">
                            <span class="modal-icon">${icon}</span>
                            <div class="modal-title">${title}</div>
                            <div class="modal-text">${text}</div>
                            <button class="modal-btn" id="modalBtn">${btnText}</button>
                        </div>
                    </div>
                `;
                document.getElementById('modalBtn').onclick = () => {
                    modalContainer.innerHTML = '';
                    if (callback) callback();
                };
                document.getElementById('modalOverlay').onclick = (e) => {
                    if (e.target === e.currentTarget) {
                        modalContainer.innerHTML = '';
                        if (callback) callback();
                    }
                };
            }

            /* ══════════════════════════════ 初始化 / 重置 ══════════════════════════════ */
            function initGame() {
                const idx = Math.floor(Math.random() * wordBank.length);
                targetWord = wordBank[idx].word;
                targetTags = wordBank[idx].tags;
                targetPinyinStr = getPinyin(targetWord);
                chancesLeft = MAX_CHANCES;
                historyEntries = [];
                guessedSet.clear();
                gameOver = false;
                wrongCount = 0;
                hintIndex = 0;
                btnGuess.disabled = false;
                guessInput.disabled = false;
                guessInput.value = '';
                guessInput.style.borderColor = '';
                guessInput.focus();
                resultCard.classList.remove('visible');
                updateStatusBar();
                updateHintsDisplay();
                updateHistoryDisplay();
                console.log(`🎯 目标词: ${targetWord}  标签: ${targetTags.join(', ')}`);
            }

            function resetGame() { initGame(); }

            /* ══════════════════════════════ 事件绑定 ══════════════════════════════ */
            btnGuess.addEventListener('click', handleGuess);
            guessInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') { e.preventDefault();
                    handleGuess(); }
            });
            btnGiveUp.addEventListener('click', () => {
                if (gameOver) return;
                gameOver = true;
                btnGuess.disabled = true;
                guessInput.disabled = true;
                showModal('🏳️', '已放弃',
                    `目标词是 <strong>「${targetWord}」</strong><br>下次一定能猜到！`,
                    '再来一局', resetGame);
            });

            /* ══════════════════════════════ 启动 ══════════════════════════════ */
            initGame();
        })();
    </script>
</body>
</html>
