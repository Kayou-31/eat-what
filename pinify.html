<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>拼音标注 · 即时注音</title>
    <script src="https://cdn.tailwindcss.com">
    </script>
    <script src="https://unpkg.com/pinyin-pro@3.18.3/dist/index.js">
    </script>
    <style>
        /* 精致拼音样式 */
        ruby {
            ruby-align: center;
            ruby-position: over;
        }
        ruby rt {
            font-size: 0.7em;
            color: #4f46e5;
            font-weight: 500;
            letter-spacing: 0.02em;
            transform: translateY(-3px);
            user-select: none;
            opacity: 0.9;
            transition: opacity 0.15s;
        }
        ruby:hover rt {
            opacity: 1;
        }
        .pinyin-output {
            line-height: 2.6;
            font-size: 1.2rem;
        }
        .pinyin-output ruby+ruby {
            margin-left: 0.06em;
        }
        /* 滚动条美感 */
        .custom-scroll::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        .custom-scroll::-webkit-scrollbar-track {
            background: #f1f5f9;
            border-radius: 6px;
        }
        .custom-scroll::-webkit-scrollbar-thumb {
            background: #c7d2fe;
            border-radius: 6px;
        }
        .custom-scroll::-webkit-scrollbar-thumb:hover {
            background: #a5b4fc;
        }
        /* 输入框光晕 */
        .input-glow:focus-within {
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.15);
            border-color: #6366f1;
        }
        /* 卡片悬浮 */
        .card-hover {
            transition: transform 0.2s ease, box-shadow 0.3s ease;
        }
        .card-hover:hover {
            transform: translateY(-2px);
            box-shadow: 0 16px 40px rgba(79, 70, 229, 0.08);
        }
        /* 示例按钮 */
        .example-btn {
            transition: all 0.2s;
            background: white;
        }
        .example-btn:hover {
            background: #eef2ff;
            border-color: #818cf8;
            color: #4f46e5;
            transform: scale(1.02);
        }
        /* 统计数字 */
        .stat-number {
            font-variant-numeric: tabular-nums;
        }
        /* 移动端适配 */
        @media (max-width: 640px) {
            .pinyin-output {
                font-size: 1.05rem;
                line-height: 2.4;
            }
            ruby rt {
                font-size: 0.6em;
                transform: translateY(-2px);
            }
        }
        /* 空状态 */
        .empty-hint {
            color: #c4b5fd;
            user-select: none;
        }
        /* 清除按钮 */
        .clear-btn {
            transition: all 0.2s;
        }
        .clear-btn:hover {
            background: #fee2e2;
            color: #dc2626;
            border-color: #fca5a5;
        }
        /* 底部波浪装饰 */
        .bg-decoration {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.03) 0%, rgba(139, 92, 246, 0.03) 100%);
            border-top: 1px solid rgba(99, 102, 241, 0.06);
            pointer-events: none;
            z-index: 0;
        }
        main {
            position: relative;
            z-index: 1;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-50 via-indigo-50/30 to-purple-50/30 min-h-screen font-sans antialiased">

    <!-- ===== 顶部 ===== -->
    <header class="pt-10 pb-6 px-4 text-center relative z-10">
        <h1 class="text-4xl md:text-5xl font-extrabold bg-gradient-to-r from-indigo-600 via-purple-600 to-pink-500 bg-clip-text text-transparent tracking-tight drop-shadow-sm">
            ✦ 拼音标注
        </h1>
        <p class="mt-3 text-slate-400 text-base md:text-lg max-w-xl mx-auto font-medium">
            粘贴或输入中文 · 即时标注拼音
        </p>
        <div class="mt-4 flex items-center justify-center gap-2 text-xs text-slate-400">
            <span class="inline-flex items-center gap-1">
                <span class="w-2 h-2 rounded-full bg-indigo-400"></span> 多音字识别
            </span>
            <span class="text-slate-300">·</span>
            <span class="inline-flex items-center gap-1">
                <span class="w-2 h-2 rounded-full bg-purple-400"></span> 实时响应
            </span>
            <span class="text-slate-300">·</span>
            <span class="inline-flex items-center gap-1">
                <span class="w-2 h-2 rounded-full bg-pink-400"></span> 一键清空
            </span>
        </div>
    </header>

    <!-- ===== 主卡片 ===== -->
    <main class="max-w-3xl mx-auto px-4 pb-20">
        <section class="bg-white/80 backdrop-blur-sm rounded-2xl shadow-lg shadow-indigo-100/40 border border-indigo-100/60 p-6 md:p-8 card-hover transition-all">

            <!-- 标题区 -->
            <div class="flex items-center gap-3 mb-5">
                <span class="flex items-center justify-center w-11 h-11 rounded-xl bg-indigo-100 text-indigo-600 text-2xl shadow-sm">📖</span>
                <div>
                    <h2 class="text-xl font-bold text-slate-800">中文注音</h2>
                    <p class="text-xs text-slate-400 mt-0.5">支持简体、繁体、多音字 · 自动标注</p>
                </div>
            </div>

            <!-- 输入区 -->
            <div class="input-glow border border-slate-200 rounded-xl overflow-hidden transition-all bg-white">
                <textarea id="pinyinInput"
                placeholder="在此输入中文文字…"
                rows="5"
                class="w-full resize-none border-0 outline-none p-4 text-slate-700 placeholder:text-slate-300 text-base leading-relaxed custom-scroll transition-colors focus:bg-indigo-50/10"
            ></textarea>
        </div>

        <!-- 工具栏：统计 + 操作 -->
        <div class="mt-3 flex items-center justify-between flex-wrap gap-2">
            <div class="flex items-center gap-4 text-sm">
                <span class="text-slate-400 flex items-center gap-1.5">
                    <span class="text-indigo-300 text-base">📝</span>
                    <span id="pinyinCount" class="stat-number font-medium text-slate-500">0 字符</span>
                </span>
                <span id="wordCount" class="text-slate-400 text-sm stat-number hidden sm:inline">
                    <span class="text-slate-300">·</span> 0 词
                </span>
            </div>
            <div class="flex gap-2">
                <button id="clearPinyinBtn"
                class="clear-btn text-xs px-3 py-1.5 rounded-full border border-slate-200 text-slate-400 hover:bg-red-50 hover:text-red-500 hover:border-red-200 transition-all"
            >
                ✕ 清空
            </button>
            <span class="text-xs text-indigo-300 self-center">按 ESC 快速清空</span>
        </div>
    </div>

    <!-- 拼音输出 -->
    <div class="mt-4 bg-gradient-to-br from-indigo-50/40 to-purple-50/30 border border-indigo-100/50 rounded-xl p-5 min-h-[120px] max-h-[320px] overflow-y-auto custom-scroll transition-all">
        <div id="pinyinOutput"
        class="pinyin-output text-slate-700 break-words select-text"
    >
        <span class="empty-hint text-sm">等待输入…</span>
    </div>
</div>

<!-- 快捷示例 -->
<div class="mt-5 flex flex-wrap items-center gap-2.5">
    <span class="text-xs text-slate-400 font-medium mr-1">试试示例：</span>
    <button class="example-btn text-xs px-3.5 py-1.5 rounded-full border border-indigo-200 text-indigo-500 bg-indigo-50/30 shadow-sm" data-example="你好世界，欢迎来到拼音标注工具！">
        示例 ❶
    </button>
    <button class="example-btn text-xs px-3.5 py-1.5 rounded-full border border-indigo-200 text-indigo-500 bg-indigo-50/30 shadow-sm" data-example="音乐会上，小明弹奏了动听的旋律。">
        示例 ❷
    </button>
    <button class="example-btn text-xs px-3.5 py-1.5 rounded-full border border-indigo-200 text-indigo-500 bg-indigo-50/30 shadow-sm" data-example="朝辞白帝彩云间，千里江陵一日还。">
        示例 ❸
    </button>
    <button class="example-btn text-xs px-3.5 py-1.5 rounded-full border border-purple-200 text-purple-500 bg-purple-50/30 shadow-sm" data-example="人工智能正在改变世界。">
        示例 ❹
    </button>
</div>

<!-- 底部提示 -->
<div class="mt-6 pt-4 border-t border-slate-100 flex items-center justify-between text-xs text-slate-400">
    <span>🔤 基于 pinyin-pro 引擎</span>
    <span class="text-indigo-300">✦ 拼音自动标注 · 即输即显</span>
</div>
</section>
</main>

<!-- ===== 底部装饰 ===== -->
<div class="bg-decoration"></div>
<footer class="relative z-10 pb-6 text-center text-xs text-slate-400">
    <span class="inline-flex items-center gap-2">
        <span class="w-1.5 h-1.5 rounded-full bg-indigo-300"></span>
        粘贴即响应 · 拼音更清晰
        <span class="w-1.5 h-1.5 rounded-full bg-purple-300"></span>
    </span>
</footer>

<!-- ============================================================ -->
<!-- JavaScript -->
<!-- ============================================================ -->
<script>
    (function() {
        'use strict';

        // ---------- DOM 元素 ----------
        const pinyinInput = document.getElementById('pinyinInput');
        const pinyinOutput = document.getElementById('pinyinOutput');
        const pinyinCount = document.getElementById('pinyinCount');
        const wordCount = document.getElementById('wordCount');
        const clearBtn = document.getElementById('clearPinyinBtn');
        const exampleBtns = document.querySelectorAll('.example-btn');

        // ---------- 核心：更新拼音 ----------
        function updatePinyin() {
            const text = pinyinInput.value;
            const len = text.length;
            const trimmed = text.trim();

            // 更新字符数
            pinyinCount.textContent = len + ' 字符';

            // 更新词数（粗略按空格和标点分割，仅作趣味统计）
            if (trimmed) {
                const words = trimmed.split(/[\s,，。；;！!？?、·〃""''「」『』【】《》—…·]+/).filter(w => w.length > 0);
                wordCount.textContent = '· ' + words.length + ' 词';
                wordCount.classList.remove('hidden');
            } else {
                wordCount.textContent = '· 0 词';
                wordCount.classList.remove('hidden');
            }

            // 空状态
            if (!trimmed) {
                pinyinOutput.innerHTML = '<span class="empty-hint text-sm">等待输入…</span>';
                return;
            }

            // 生成拼音 HTML
            try {
                // 使用 pinyin-pro 的 html 方法生成带 ruby 的拼音
                // type: 'string' 保持非中文原样，toneType: 'symbol' 使用声调符号
                const html = pinyinPro.html(text, {
                    toneType: 'symbol',
                    type: 'string',
                });
                // 如果返回空或无效，回退显示原文
                if (html && html.trim()) {
                    pinyinOutput.innerHTML = html;
                } else {
                    pinyinOutput.textContent = text;
                }
            } catch (e) {
                console.warn('拼音生成异常:', e);
                // 容错：直接显示原文
                pinyinOutput.textContent = text;
            }
        }

        // ---------- 清空输入 ----------
        function clearInput() {
            pinyinInput.value = '';
            updatePinyin();
            pinyinInput.focus();
        }

        // ---------- 设置示例文本 ----------
        function setExample(text) {
            pinyinInput.value = text;
            updatePinyin();
            // 滚动到输出区域，提升体验
            pinyinOutput.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        // ---------- 事件绑定 ----------

        // 输入事件：即时响应
        pinyinInput.addEventListener('input', updatePinyin);

        // 粘贴事件：使用 requestAnimationFrame 确保内容已更新
        pinyinInput.addEventListener('paste', function() {
            requestAnimationFrame(updatePinyin);
        });

        // 剪切事件
        pinyinInput.addEventListener('cut', function() {
            // 延迟执行，等待内容变化
            setTimeout(updatePinyin, 10);
        });

        // 清空按钮
        clearBtn.addEventListener('click', clearInput);

        // 键盘快捷键：ESC 清空
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' && document.activeElement === pinyinInput) {
                e.preventDefault();
                clearInput();
            }
        });

        // 示例按钮
        exampleBtns.forEach(function(btn) {
            btn.addEventListener('click', function() {
                const text = this.dataset.example;
                if (text) {
                    setExample(text);
                }
            });
        });

        // ---------- 初始化 ----------
        updatePinyin();

        // 额外：当页面完全加载后，聚焦输入框（如果为空）
        if (!pinyinInput.value.trim()) {
            // 不强制聚焦，避免移动端键盘弹出困扰
            // 但可以加一个轻轻的提示
            console.log('📖 拼音标注工具已就绪 · 输入中文即可');
        }

        // 防抖保护：对于极端快速的输入，不需要额外处理，pinyin-pro 足够快

        // 兼容性：如果浏览器不支持 Ruby，不影响显示原文
        // 但 pinyin-pro 生成的 ruby 标签在现代浏览器中完美支持

        console.log('✅ 拼音标注工具已启动');
        console.log('💡 提示：按 ESC 清空输入 · 点击示例快速体验');

    })();
</script>

</body>
</html>
